    slots:
      num: "09"
      pill_label: "LA ESCALERA DE PLATA"
      title: "Mismo tema toda la semana. Cambia <span class=\"pop\">cuánto profundizas</span>"
      subtitle: "Lo que cambia entre un nivel y otro no es el tema — es qué tan lejos lo llevas, y qué tanto puedes hacer con él."
      cards:
        - num: "9.1"
          icon: "👁"
          title: "El Observador"
          body: "Te llevas el mapa: entiendes la oportunidad completa y pruebas el método básico con tus propias manos. Sales sabiendo que esto es real."
        - num: "9.2"
          icon: "🛠"
          title: "El Aprendiz"
          body: "Das el primer paso real: armas tu primer coach o podcast de práctica, de principio a fin. Pasas de entender a hacer."
        - num: "9.3"
          icon: "🎯"
          title: "El Arquitecto"
          body: "El curso completo: conviertes el método en un servicio que le cobras a negocios, con los paquetes, los prompts y el plan de acción. Pasas de hacer a vender."
        - num: "9.4"
          icon: "🏗"
          title: "Toque de Midas"
          body: "Montas la fábrica que escala y me ves armar el sistema desde cero, sobre el hombro. Pasas de vender uno a construir muchos."
    notes: |
      ## Para qué sirve subir de nivel

      #### Analogía — los grados de la escuela

      Nadie aprende a leer, escribir y resolver problemas el mismo día. Por eso la escuela tiene grados: primero reconoces las letras, después armas palabras, luego oraciones, y más adelante escribes una historia entera. Cada grado usa lo del anterior y agrega una capa. La escalera funciona igual: el mismo tema, pero cada nivel te lleva un grado más lejos.

      #### El tema no cambia, la profundidad sí

      Toda la semana se habla de lo mismo. Lo que cambia de un nivel a otro es cuánto bajas al detalle y qué tan lejos lo puedes llevar — de entenderlo, a hacerlo, a venderlo, a construir un sistema que se repite. Subir de nivel es seguir el mismo camino más adentro.

