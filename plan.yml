      title: "El mismo molde sirve para <span class=\"pop\">cualquier tema</span>"
      subtitle: "El sistema es uno solo. Cambias el tema y el material, y vuelves a armar todo en otro nicho."
      cards:
        - num: "6.1"
          icon: "🥑"
          title: "Dieta keto"
          body: "Reúnes los videos de los referentes de la dieta keto y armas un coach que responde dudas, más una serie de podcasts por ángulos: para principiantes, recetas, errores comunes, la parte de salud."
        - num: "6.2"
          icon: "🐕"
          title: "Entrenamiento canino"
          body: "Mismo molde: los videos de los mejores entrenadores se vuelven un coach que responde, y podcasts por tema — cachorros, ladridos, caminar con correa."
        - num: "6.3"
          icon: "🔁"
          title: "Cualquier micro-nicho"
          body: "Inmobiliaria, marketing local, finanzas, fitness, lo que sea. El sistema es el mismo; solo cambias el tema y las fuentes."
    notes: |
      ## Por qué un solo molde sirve para todo

      #### Analogía — el molde de galletas

      Un molde de galletas tiene una sola forma, pero con él haces galletas de chocolate, de vainilla, de avena, de lo que quieras. La forma no cambia; cambia la masa. Este sistema es ese molde: la forma de armar el coach y los podcasts es siempre la misma, y lo único que cambia es el tema y las fuentes que le pones adentro.

      #### Lo aprendes una vez, lo repites mil

      El valor de tener un molde es que el trabajo difícil lo haces una sola vez: entender cómo se arma. Después, cada nicho nuevo es repetir el mismo paso con otro material. Por eso, aprender esto una vez te abre la puerta a tantos temas como quieras tomar.

