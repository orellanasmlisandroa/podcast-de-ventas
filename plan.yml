        - num: "3.3"
          icon: "🌱"
          title: "El mismo nicho, otra vez"
          body: "<a href=\"https://www.youtube.com/watch?v=F6nsDqXA1CY\" target=\"_blank\" rel=\"noopener\" style=\"display:block;position:relative;width:100%;aspect-ratio:16/9;margin-bottom:12px;border-radius:10px;overflow:hidden\"><img src=\"https://i.ytimg.com/vi/F6nsDqXA1CY/hqdefault.jpg\" alt=\"Otro podcast para aprender inglés hecho con IA en YouTube\" loading=\"lazy\" style=\"width:100%;height:100%;object-fit:cover;display:block\"><span style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center\"><span style=\"width:54px;height:38px;background:#e60000;border-radius:9px;display:flex;align-items:center;justify-content:center\"><span style=\"border-style:solid;border-width:9px 0 9px 16px;border-color:transparent transparent transparent #fff\"></span></span></span></a>Otro canal con la misma idea: inglés fácil, hecho con IA. <strong>La pieza que copiamos:</strong> si el nicho funciona para varios, funciona para ti — tomas un micro-nicho y lo haces tuyo. <a href=\"https://www.youtube.com/@SpeakEnglishWithClass\" target=\"_blank\" rel=\"noopener\">Ver en YouTube →</a>"
    notes: |
      ## Qué aprendemos de estos ejemplos

      #### Analogía — los planos de casas que ya están de pie

      Antes de construir tu casa, no tienes que adivinar si el diseño aguanta: miras casas del mismo estilo que ya llevan años de pie y aprendes de ellas. Estos canales son esas casas ya construidas. No los copias ladrillo por ladrillo — tomas el plano que funciona y lo adaptas a tu terreno.

      #### Del techo al primer escalón

      Mezclamos a propósito dos alturas. Arriba va un gigante para que veas el techo: hasta dónde llega un podcast cuando se vuelve una marca con comunidad y miembros que pagan. Abajo van dos podcasts hechos con IA, sin presentador a cámara, sobre algo tan simple como aprender inglés — y están creciendo ahora mismo.

      El gigante te muestra el sueño; los de IA te muestran que se puede empezar hoy, sin cámara, sin fama y sin equipo. Tú no copias la fama: tomas el formato, eliges un micro-nicho y lo armas con IA y fuentes reales.

  - id: lo-unico
    component: section-compare
    theme: s5
    slots:
      num: "04"
      pill_label: "LA DIFERENCIA"
      title: "El camino de casi todos, y el <span class=\"pop\">tuyo</span>"
      subtitle: "Casi todo el mundo construye lo mismo y termina compitiendo por precio. Esta semana aprendes el camino que casi nadie conoce."
      left:
        tag: "LO QUE HACE CASI TODO EL MUNDO"
        title: "Un chat más, igual a todos"
        body_md: |
          - **Pone un asistente de chat genérico** que responde con lo que cualquier IA ya sabe. Suena idéntico al de la competencia.
          - **Hace podcasts sueltos** esperando vivir de la publicidad. Lento, incierto y cada vez más castigado.
          - **Produce contenido genérico** que no se distingue de nada.
          - **Compite por precio,** porque su producto lo arma cualquiera en cinco minutos.
      right:
        tag: "LO QUE VAS A HACER TÚ"
        title: "Un coach único, hecho de fuentes reales"
        body_md: |
          - **Construyes un coach** que responde con el conocimiento real de los expertos del tema, y dice de dónde sale cada respuesta.
          - **El mismo sistema produce** podcasts, Reels y videos. Una máquina de contenido, no una pieza suelta.
          - **Lo conviertes en un producto** que vende y que un negocio paga con gusto.
          - **Nadie te copia,** porque está hecho con fuentes que la competencia no tiene.
    notes: |
      ## Por qué lo único vale más que lo genérico

      #### Analogía — preguntarle a un desconocido o al maestro del oficio

      Imagina que tienes una duda de carpintería. Puedes preguntarle a un desconocido que leyó un poco de todo, o puedes preguntarle al maestro carpintero del barrio que lleva treinta años en el oficio. Los dos te contestan, pero solo uno te da la respuesta que de verdad funciona, con el truco que solo se aprende trabajando. Un chat de IA genérico es el desconocido. Un coach hecho con los videos de los maestros es el maestro carpintero.

      #### La diferencia que la gente reconoce y paga

      Hoy cualquiera pone un chat de IA, y todos suenan parecidos porque responden con el mismo conocimiento general de internet. Lo que se distingue — y se cobra — es un coach que habla con la voz, los ejemplos y el conocimiento de los que de verdad saben del tema. Eso no se copia pegando un chat común.

  - id: el-coach
    component: section-cards
    theme: s9
    slots:
      num: "05"
      pill_label: "EL CORAZÓN DE LA SEMANA"
      title: "Coaches y podcasts hechos del <span class=\"pop\">conocimiento real</span>"
      subtitle: "Tomas entre 50 y 100 videos de los maestros de un tema y los conviertes en algo vivo: un coach con el que se conversa, y una serie de podcasts. Todo nace de las fuentes, no de la imaginación de una IA."
      cards:
        - num: "5.1"
          icon: "🎓"
          title: "El coach desde los videos"
          body: "Juntas decenas de videos de los expertos de un tema y armas un coach. La persona le pregunta y él responde con lo que esos expertos enseñaron, citando el video y el minuto exacto."
        - num: "5.2"
          icon: "🧭"
          title: "No es IA genérica"
          body: "Un asistente común responde con lo que toda IA sabe. El tuyo responde con fuentes reales y verificables. Esa es la diferencia que la gente reconoce."
        - num: "5.3"
          icon: "🎬"
          title: "Una máquina de contenido"
          body: "El mismo conocimiento sale en muchos formatos: una serie de podcasts por distintos ángulos, Reels, videos cortos y videos largos. Material promocional listo para cualquier empresa."
        - num: "5.4"
          icon: "🌐"
          title: "Tu propio producto"
          body: "Lo conviertes en tu plataforma: la gente entra, elige el coach del tema que le interesa, conversa con él y escucha sus podcasts. Tú cobras por el acceso."
    notes: |
      ## De un montón de videos a alguien con quien hablar

      #### Analogía — el recetario de la abuela que ahora te contesta

      Imagina el recetario de tu abuela: cuadernos llenos de recetas y trucos al margen. Está todo ahí, pero es un montón de papeles que tienes que revolver. Ahora imagina que el recetario te contesta cuando le preguntas — "abuela, ¿cuánto tiempo el arroz?" — y te responde con sus palabras y sus trucos. Eso es lo que pasa cuando metes los videos de un experto en un coach: el conocimiento deja de ser una pila de videos y se vuelve alguien a quien le puedes preguntar.

      #### Una nota honesta sobre las fuentes

      Lo más limpio es construir el coach con material que puedes usar: tus propios videos, los de tu cliente, o fuentes con permiso, y siempre citando de dónde sale cada respuesta. Así el producto es valioso y, además, está sobre terreno firme. Esa parte — qué se puede usar y cómo — la vemos con calma adentro.

  - id: ejemplos
    component: section-cards
    theme: s6
    slots:
